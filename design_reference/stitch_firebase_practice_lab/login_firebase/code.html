<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Dev - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#131313",
                    "surface-bright": "#393939",
                    "inverse-primary": "#765b00",
                    "primary-container": "#b68d00",
                    "secondary-container": "#059be5",
                    "on-tertiary-fixed": "#311300",
                    "on-primary-fixed-variant": "#594400",
                    "primary": "#f3c01a",
                    "on-primary-fixed": "#241a00",
                    "secondary-fixed-dim": "#90cdff",
                    "secondary-fixed": "#cbe6ff",
                    "tertiary-fixed": "#ffdcc6",
                    "on-secondary-container": "#002f4a",
                    "on-secondary-fixed-variant": "#004b72",
                    "on-surface": "#e5e2e1",
                    "on-tertiary-container": "#492100",
                    "on-primary-container": "#382a00",
                    "outline-variant": "#3f4851",
                    "primary-fixed": "#ffdf93",
                    "error-container": "#93000a",
                    "tertiary-container": "#e57400",
                    "on-surface-variant": "#bec7d2",
                    "surface-dim": "#131313",
                    "surface-tint": "#f3c01a",
                    "on-tertiary": "#502400",
                    "surface-container-highest": "#353534",
                    "on-error": "#690005",
                    "on-secondary-fixed": "#001e31",
                    "on-primary": "#3e2e00",
                    "primary-fixed-dim": "#f3c01a",
                    "tertiary-fixed-dim": "#ffb786",
                    "outline": "#88929c",
                    "on-error-container": "#ffdad6",
                    "inverse-surface": "#e5e2e1",
                    "secondary": "#90cdff",
                    "surface-container-high": "#2a2a2a",
                    "surface-container": "#201f1f",
                    "tertiary": "#ffb786",
                    "surface-variant": "#353534",
                    "inverse-on-surface": "#313030",
                    "error": "#ffb4ab",
                    "on-background": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary": "#003350",
                    "surface-container-low": "#1c1b1b",
                    "on-tertiary-fixed-variant": "#723600",
                    "surface": "#131313"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar suppressed for Transactional screen (Login) per mandate -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Ambient Glow Decoratives -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Anchor Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-surface-container rounded-xl flex items-center justify-center mb-6 border border-outline-variant/20 shadow-xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="terminal">terminal</span>
</div>
<h1 class="font-headline text-4xl font-bold tracking-tighter text-on-surface text-center mb-2">
                    Kinetic Dev
                </h1>
<p class="font-label text-sm uppercase tracking-[0.2em] text-outline text-center">
                    Command Center Login
                </p>
</div>
<!-- Login Card -->
<div class="glass-panel p-8 rounded-full border border-outline-variant/10 shadow-[0_48px_100px_-20px_rgba(0,0,0,0.5)]">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest block ml-1" for="email">Email Endpoint</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface font-label placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/30 transition-all focus:bg-surface-container-high" id="email" placeholder="developer@kinetic.io" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest block" for="password">Access Key</label>
<a class="font-label text-[10px] text-secondary hover:text-secondary-fixed transition-colors uppercase tracking-wider" href="#">Reset Secret</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="lock_open">lock_open</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface font-label placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/30 transition-all focus:bg-surface-container-high" id="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(243,192,26,0.3)] hover:shadow-[0_4px_30px_rgba(243,192,26,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Initialize Session
                        <span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 font-label text-[10px] text-outline uppercase tracking-[0.3em]">External Auth</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Google Sign In -->
<button class="w-full bg-surface-container-low hover:bg-surface-container-high border border-outline-variant/20 text-on-surface font-body font-medium py-4 rounded-xl transition-all flex items-center justify-center gap-3 active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<p class="mt-8 text-center font-body text-sm text-outline">
                    New architecture? <a class="text-primary font-bold hover:underline" href="#">Deploy account</a>
</p>
</div>
</div>
</main>
<!-- Footer Meta -->
<footer class="p-8 flex flex-col md:flex-row items-center justify-between text-outline gap-4">
<div class="flex items-center gap-4 font-label text-[10px] uppercase tracking-widest">
<span class="flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#90cdff]"></span>
                Firebase Auth Active
            </span>
<span class="text-outline-variant">v1.0.4-stable</span>
</div>
<nav class="flex gap-6 font-label text-[10px] uppercase tracking-widest">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="hover:text-on-surface transition-colors" href="#">System Status</a>
</nav>
</footer>
<!-- BottomNavBar suppressed for Transactional screen (Login) per mandate -->
</body></html>
